# Quick test config — Office-0 with 800 frames to capture loop closures
experiment_name: "duag_c_replica_office0"

dataset:
  name: replica_multiagent
  path: data/ReplicaMultiagent
  scenes: ["Office-0"]
  n_agents: 2
  depth_scale: 6553.5
  cam:
    H: 680
    W: 1200
    fx: 600.0
    fy: 600.0
    cx: 599.5
    cy: 339.5

system:
  use_fim_weighting: true
  admm_rho_init: 1.0
  admm_rho_max: 100.0
  admm_max_iter: 100
  admm_tol_primal: 1.0e-4
  admm_tol_dual: 1.0e-4
  pose_lr: 0.1
  lambda_gauss: 1.0
  gaussian_match_thresh: 0.05
  fim_window_keyframes: 10
  max_gaussians: 100000
  n_init_gaussians: 500
  refine_iterations: 3000
  device: "cuda"

monogs_config_path: repos/MonoGS/configs/rgbd/replica/base_config.yaml

output:
  dir: outputs
  save_trajectory: true
  save_map: true
  save_metrics: true

seed: 42
frame_limit: 200
