# experiments/configs/s3e_duag_c.yaml
# S3Ev1 dataset — 2 outdoor sequences with 3 UGVs
# H4: DUAG-C degrades gracefully with reduced robot overlap
experiment_name: "DUAG-C_S3E"
dataset_name: s3e
dataset:
  name: s3e
  path: data/s3e/
  scenes: ["S3E_Playground_2", "S3E_Square_2"]
  n_agents: 3
  depth_scale: 1000.0   # 16-bit PNG in mm
  cam:
    H: 1024
    W: 1224
    fx: 1172.771733
    fy: 1172.364006
    cx: 617.941546
    cy: 507.672727

system:
  use_fim_weighting: true
  admm_rho_init: 1.0
  admm_rho_max: 100.0
  admm_max_iter: 150
  admm_tol_primal: 5.0e-4
  admm_tol_dual: 5.0e-4
  pose_lr: 0.1
  lambda_gauss: 1.0
  gaussian_match_thresh: 0.10
  fim_window_keyframes: 10
  max_gaussians: 150000
  n_init_gaussians: 500
  device: "cpu"

output:
  dir: outputs
  save_trajectory: true
  save_map: true
  save_metrics: true

metrics: [ATE_RMSE, RPE_trans, admm_iterations, comm_bytes_total]

validate:
  ATE_RMSE_Playground: "<0.50"
  ATE_RMSE_Square: "<0.50"

hypothesis: "H4: DUAG-C degrades gracefully with reduced robot overlap."

seed: 42
frame_limit: -1
frame_step: 3   # subsample 10fps -> ~3.3fps for efficiency
