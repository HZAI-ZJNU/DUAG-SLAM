# experiments/configs/kimera_campus_duag_c.yaml
# Kimera-Multi Campus-Outdoor: 6 Jackal UGVs with Intel RealSense D455
# Rosbags require access request: https://forms.gle/EBHJE3LEKkTsnABu7
# GT trajectories: https://drive.google.com/drive/folders/1LKUC7wLhlVuoxYRhSCZYUVAAffA9EpDy
# Running in synthetic mode: GT trajectories + cumulative drift
experiment_name: "DUAG-C_Kimera_Campus"
dataset_name: kimera_campus
dataset:
  name: kimera_campus
  path: data/kimera_campus/
  scenes: ["campus_outdoor"]
  # Run three times with different robot subsets to test N-robot scaling
  robot_subsets: [[0,1], [0,1,2,3], [0,1,2,3,4,5]]
  n_agents: 6
  depth_scale: 1000.0
  # Intel RealSense D455: 640x480 RGB-D
  cam:
    H: 480
    W: 640
    fx: 386.179
    fy: 386.179
    cx: 323.395
    cy: 237.784

# Number of frames per robot in synthetic trajectory generation
kimera_frames: 300

system:
  use_fim_weighting: true
  admm_rho_init: 1.0
  admm_rho_max: 100.0
  admm_max_iter: 200
  admm_tol_primal: 1.0e-3
  admm_tol_dual: 1.0e-3
  pose_lr: 0.1
  lambda_gauss: 1.0
  gaussian_match_thresh: 0.15
  fim_window_keyframes: 10
  max_gaussians: 200000
  n_init_gaussians: 500
  device: "cpu"

output:
  dir: outputs
  save_trajectory: true
  save_map: true
  save_metrics: true

metrics: [ATE_RMSE, RPE_trans, admm_iterations, comm_bytes_total]

validate:
  ATE_scaling: "sub-linear with N_robots"

hypothesis: "Outdoor generalization and N-robot scaling. ATE should scale sub-linearly with N."

seed: 42
frame_limit: -1
