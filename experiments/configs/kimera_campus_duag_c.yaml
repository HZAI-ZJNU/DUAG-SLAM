# experiments/configs/kimera_campus_duag_c.yaml
# Step 21: Kimera-Multi Campus-Outdoor — N-robot scaling validation
# Data: GT trajectories from https://github.com/MIT-SPARK/Kimera-Multi-Data
# Platform: 6 Clearpath Jackal UGVs with Intel RealSense D455
# No images available (rosbags gated) — runs in synthetic drift mode
experiment_name: "DUAG-C_Kimera_Campus"
dataset_name: kimera_campus
dataset:
  name: kimera_campus
  path: data/kimera_campus/
  sequences: ["Campus-Outdoor"]
  scenes: ["Campus-Outdoor"]
  # Robot IDs: 0=acl_jackal, 1=acl_jackal2, 2=sparkal1, 3=sparkal2, 4=hathor, 5=thoth
  robot_subsets: [[0, 1], [0, 1, 2, 3], [0, 1, 2, 3, 4, 5]]
  n_agents: 6
  depth_scale: 1000.0
  cam:
    # Intel RealSense D455 intrinsics from calibration/LeftCameraParams.yaml
    H: 480
    W: 640
    fx: 377.229
    fy: 377.487
    cx: 326.352
    cy: 239.660

system:
  use_fim_weighting: true
  admm_rho_init: 1.0
  admm_rho_max: 100.0
  admm_max_iter: 200
  admm_tol_primal: 1.0e-3
  admm_tol_dual: 1.0e-3
  pose_lr: 0.1
  lambda_gauss: 1.0
  gaussian_match_thresh: 0.15
  loop_closure_distance_thresh: 10.0
  fim_window_keyframes: 10
  max_gaussians: 200000
  n_init_gaussians: 500
  device: "cpu"

output:
  dir: outputs
  save_trajectory: true
  save_map: true
  save_metrics: true

metrics: [ATE_RMSE, RPE_trans, admm_iterations, comm_bytes_total]

validate:
  ATE_scaling: "sub-linear with N_robots"

hypothesis: "Outdoor generalization and N-robot scaling."

seed: 42
# frame_limit: full run
frame_step: 1
