# experiments/configs/aria_multiagent_duag_c.yaml
# Step 19: Aria-Multiagent experiment — validates H3 (uncertainty calibration, ECE < 0.05)
experiment_name: "duag_c_aria_multiagent"

dataset:
  name: aria_multiagent
  path: data/AriaMultiagent
  scenes: ["room0"]
  n_agents: 3
  depth_scale: 6553.5
  cam:
    H: 512
    W: 512
    fx: 280.0
    fy: 280.0
    cx: 255.5
    cy: 255.5

system:
  use_fim_weighting: true
  admm_rho_init: 1.0
  admm_rho_max: 100.0
  admm_max_iter: 100
  admm_tol_primal: 1.0e-4
  admm_tol_dual: 1.0e-4
  pose_lr: 0.1
  lambda_gauss: 1.0
  gaussian_match_thresh: 0.05
  fim_window_keyframes: 10
  max_gaussians: 30000
  n_init_gaussians: 500
  device: "cuda"

monogs_config_path: experiments/configs/aria_monogs_base.yaml

output:
  dir: outputs
  save_trajectory: true
  save_map: true
  save_metrics: true

seed: 42
frame_limit: 100
