# Single-scene test: Apart-0 only, 2500 frames, NO consensus (pure MonoGS tracking)
experiment_name: "duag_c_apart0_2500_no_consensus"

dataset:
  name: replica_multiagent
  path: data/ReplicaMultiagent
  scenes: ["Apart-0"]
  n_agents: 2
  depth_scale: 6553.5
  cam:
    H: 680
    W: 1200
    fx: 600.0
    fy: 600.0
    cx: 599.5
    cy: 339.5

system:
  use_fim_weighting: true
  admm_rho_init: 1.0
  admm_rho_max: 100.0
  admm_max_iter: 100
  admm_tol_primal: 1.0e-4
  admm_tol_dual: 1.0e-4
  pose_lr: 0.1
  lambda_gauss: 1.0
  gaussian_match_thresh: 0.05
  fim_window_keyframes: 10
  max_gaussians: 30000
  n_init_gaussians: 500
  device: "cuda"
  # Set to 0 to disable all loop closures — pure MonoGS tracking baseline
  loop_closure_distance_thresh: 0.0

monogs_config_path: repos/MonoGS/configs/rgbd/replica/base_config.yaml

output:
  dir: outputs
  save_trajectory: true
  save_map: true
  save_metrics: true

seed: 42
frame_limit: 2500
