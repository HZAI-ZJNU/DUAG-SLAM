# MonoGS base config for S3E dataset
# Camera: 1224x1024, stereo, depth from stereo matching
Results:
  save_results: True
  save_dir: "results"
  save_trj: True
  save_trj_kf_intv: 20
  use_gui: False
  eval_rendering: False
  use_wandb: False

Dataset:
  sensor_type: 'depth'
  pcd_downsample: 16
  pcd_downsample_init: 8
  adaptive_pointsize: True
  point_size: 0.05
  type: 'replica'
  Calibration:
    fx: 586.385866
    fy: 586.182003
    cx: 308.970773
    cy: 253.836363
    k1: 0.0
    k2: 0.0
    p1: 0.0
    p2: 0.0
    k3: 0.0
    width: 612
    height: 512
    depth_scale: 1000.0
    distorted: False

Training:
  init_itr_num: 1050
  init_gaussian_update: 100
  init_gaussian_reset: 500
  init_gaussian_th: 0.005
  init_gaussian_extent: 30
  tracking_itr_num: 200
  min_tracking_itr: 80
  mapping_itr_num: 150
  gaussian_update_every: 150
  gaussian_update_offset: 50
  gaussian_th: 0.7
  gaussian_extent: 5.0
  gaussian_reset: 2001
  size_threshold: 20
  kf_interval: 4
  window_size: 10
  pose_window: 5
  edge_threshold: 4
  rgb_boundary_threshold: 0.01
  kf_translation: 0.08
  kf_min_translation: 0.04
  kf_overlap: 0.90
  prune_mode: 'slam'
  single_thread: True
  spherical_harmonics: False
  max_gaussians: 50000
  alpha: 0.1
  tracking_opacity_thresh: 0.3
  lr:
    cam_rot_delta: 0.005
    cam_trans_delta: 0.02
  gps_prior_weight: 10.0

opt_params:
  iterations: 30000
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_dssim: 0.2
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002

model_params:
  sh_degree: 0
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: False
  data_device: "cuda"

pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False
